# ==============================================================================
# Mosquitto MQTT Broker Configuration — MedSec-OCR
# Lab 7: mTLS (Mutual TLS) secured MQTT
# ==============================================================================

# --- Listener ---
# Only mTLS listener on port 8883. No plaintext listener (port 1883) is defined.
listener 8883

# --- TLS / mTLS (Lab 7) ---
# CA certificate to verify client certificates
cafile /run/secrets/ca.crt
# Broker's own certificate and private key
certfile /run/secrets/server.crt
keyfile /run/secrets/server.key
# Require clients to present a valid certificate signed by our CA
require_certificate true
# Extract username from client certificate's Common Name (CN)
use_subject_as_username true

# --- Authentication ---
# Disable anonymous access — only clients with valid certs are accepted.
# Authentication is handled entirely via mTLS certificates.
allow_anonymous false

# --- Security Hardening ---
# Maximum in-flight QoS 1/2 messages per client
max_inflight_messages 20
# Maximum queued messages per client
max_queued_messages 1000
# Maximum payload size: 10 MB (medical images can be large)
message_size_limit 10485760
# Maximum concurrent client connections
max_connections 50

# --- Persistence ---
persistence true
persistence_location /mosquitto/data/

# --- Logging ---
log_type all
connection_messages true
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S
