name: Contributors

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'

jobs:
  contributors:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Run contributor metrics
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/contributors.sh
          ./scripts/contributors.sh