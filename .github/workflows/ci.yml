name: CI

on:
  workflow_dispatch:
    inputs:
      failure_scenario:
        description: "Failure scenario to simulate for the troubleshooting agent"
        required: true
        default: dependency_issue
        type: choice
        options:
          - dependency_issue
          - test_failure
          - permission_error
          - timeout
          - build_syntax_failure
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Intentional CI failure for troubleshooting demo
        env:
          DEMO_SCENARIO: ${{ github.event.inputs.failure_scenario || 'dependency_issue' }}
        run: |
          echo "Selected demo failure scenario: ${DEMO_SCENARIO}"
          case "${DEMO_SCENARIO}" in
            dependency_issue)
              echo "DEMO_FAILURE_CATEGORY=dependency_issue"
              echo "Simulated dependency issue: package demo-missing-package could not be resolved"
              echo "Error: Cannot find module 'demo-missing-package'"
              exit 1
              ;;
            test_failure)
              echo "DEMO_FAILURE_CATEGORY=test_failure"
              echo "pytest reported failed tests"
              echo "AssertionError: expected status code 200, got 500"
              exit 1
              ;;
            permission_error)
              echo "DEMO_FAILURE_CATEGORY=permission_error"
              echo "Error: 403 forbidden"
              echo "permission denied while accessing protected deployment token"
              exit 1
              ;;
            timeout)
              echo "DEMO_FAILURE_CATEGORY=timeout"
              echo "Error: operation timed out while waiting for integration tests"
              echo "context deadline exceeded"
              exit 1
              ;;
            build_syntax_failure)
              echo "DEMO_FAILURE_CATEGORY=build_or_syntax_failure"
              echo "SyntaxError: invalid syntax in client/src/App.tsx"
              echo "build failed with exit code 1"
              exit 1
              ;;
            *)
              echo "Unknown demo scenario: ${DEMO_SCENARIO}"
              exit 1
              ;;
          esac

      # Go backend
      - name: Install system dependencies (tesseract + leptonica)
        run: |
          sudo apt-get update
          sudo apt-get install -y libtesseract-dev libleptonica-dev tesseract-ocr

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Tidy modules
        working-directory: server
        run: go mod tidy

      - name: Go build
        working-directory: server
        run: go build ./...

      - name: Go test
        working-directory: server
        run: go test ./... -v -coverprofile=coverage.out 2>&1 | tee test-results.txt

      - name: Upload Go test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-test-results
          path: server/test-results.txt

      - name: Upload Go coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: server/coverage.out

      # React/Vite frontend
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"
          cache-dependency-path: client/yarn.lock

      - name: Install client dependencies
        working-directory: client
        run: yarn install --frozen-lockfile

      - name: Client lint
        working-directory: client
        run: yarn lint

      - name: Client build
        working-directory: client
        run: yarn build

      # Docker build
      - name: Docker build API image
        working-directory: server
        run: docker build -t ss-web-api:test .

